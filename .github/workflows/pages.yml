name: Publicar configurador no GitHub Pages

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths:
      - "pages/**"
      - ".github/workflows/pages.yml"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  deploy:
    name: Publicar Pages
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4

      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v5

      - name: Enviar artefato estático
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages

      - name: Publicar
        id: deployment
        uses: actions/deploy-pages@v4
