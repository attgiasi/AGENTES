name: Gmail Apple IA Agent

on:
  workflow_dispatch:
  schedule:
    - cron: "0 * * * *"

permissions:
  contents: read

jobs:
  run-agent:
    name: Rodar agente Gmail Apple IA
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4

      - name: Preparar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Instalar dependências
        run: npm ci

      - name: Validar projeto
        run: npm run check

      - name: Validar autenticação Gmail
        env:
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          GOOGLE_TOKEN_JSON: ${{ secrets.GOOGLE_TOKEN_JSON }}
        run: npm run gmail:check

      - name: Rodar agente em modo agendado
        env:
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          GOOGLE_TOKEN_JSON: ${{ secrets.GOOGLE_TOKEN_JSON }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ secrets.GEMINI_MODEL }}
          SHORTCUT_TOKEN: ${{ secrets.SHORTCUT_TOKEN }}
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
          AGENT_SETTINGS_JSON: ${{ secrets.AGENT_SETTINGS_JSON }}
        run: npm run start

      - name: Guardar relatórios e logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gmail-apple-agent-logs
          path: |
            logs/
            reports/
          if-no-files-found: ignore
