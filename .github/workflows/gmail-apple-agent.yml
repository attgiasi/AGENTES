name: Gmail Apple IA Agent

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths:
      - ".github/workflows/gmail-apple-agent.yml"
      - "src/**"
      - "scripts/**"
      - "test/**"
      - "package.json"
      - "package-lock.json"
  schedule:
    - cron: "0 * * * *"

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-agent:
    name: Rodar agente Gmail Apple IA
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Baixar repositório
        uses: actions/checkout@v6

      - name: Preparar Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Instalar dependências
        run: npm ci

      - name: Validar projeto
        run: npm run check

      - name: Validar configuração do agente
        env:
          AGENT_SETTINGS_JSON: ${{ secrets.AGENT_SETTINGS_JSON }}
        run: npm run config:validate && npm run config:summary

      - name: Validar autenticação Gmail
        env:
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          GOOGLE_TOKEN_JSON: ${{ secrets.GOOGLE_TOKEN_JSON }}
        run: npm run gmail:check

      - name: Rodar agente em modo agendado
        env:
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          GOOGLE_TOKEN_JSON: ${{ secrets.GOOGLE_TOKEN_JSON }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ secrets.GEMINI_MODEL }}
          SHORTCUT_TOKEN: ${{ secrets.SHORTCUT_TOKEN }}
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
          AGENT_SETTINGS_JSON: ${{ secrets.AGENT_SETTINGS_JSON }}
        run: npm run start

      - name: Guardar relatórios e logs
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: gmail-apple-agent-logs
          path: |
            logs/
            reports/
          if-no-files-found: ignore
